  #         retention-days: 30

  # ── Publish GitHub Release ────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-jvm]
    # needs: [build-jvm, build-native]
    # Proceed even if native build fails (it's optional)
    if: always() && needs.build-jvm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      # `gh release create` requires write access to repository contents.
      # Workflow-level default is `contents: read`; override here only for this job.
      contents: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download JVM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jvm-release
          path: release/

      - name: Download native artifacts (if available)
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-release
          path: release/

      - name: Determine release channel
        id: channel
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "${TAG}" ]; then
            echo "Release tag could not be resolved" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Pre-release detection: -rc*, -alpha*, -beta* suffixes
          if echo "$TAG" | grep -qiE '-(rc|alpha|beta)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "Release channel: $(grep channel "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.channel.outputs.tag }}"
          PRERELEASE="${{ steps.channel.outputs.prerelease }}"

          RELEASE_FLAGS="--title ${TAG}"
          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_FLAGS="${RELEASE_FLAGS} --prerelease"
          fi

          # Collect all release files
          FILES=$(find release/ -type f | sort)

          echo "Publishing ${TAG} (channel: ${{ steps.channel.outputs.channel }})"
          echo "Artifacts:"
          echo "$FILES"

          # shellcheck disable=SC2086
          gh release create "${TAG}" \
            ${RELEASE_FLAGS} \
            --generate-notes \
            ${FILES}
