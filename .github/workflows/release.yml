name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.04.14-label)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Keep in sync with pom.xml <jdk.version> and .sdkmanrc
  JDK_VERSION: '26'
  GRAALVM_JAVA_VERSION: '25.0.3'
  GRAALVM_DISTRIBUTION: 'graalvm'

jobs:
  # ── JVM artifact build ────────────────────────────────────────────────
  build-jvm:
    name: Build JVM Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Build and test
        run: ./mvnw -B -ntp verify

      - name: Generate SBOM (CycloneDX)
        run: >
          ./mvnw -B -ntp -DskipTests
          org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp target/multi-agent-reviewer-*.jar release-artifacts/
          cp target/sbom.json release-artifacts/ 2>/dev/null || true

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          for f in *; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Upload JVM release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: jvm-release
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30

