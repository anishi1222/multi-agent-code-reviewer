name: Scheduled Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with pom.xml <jdk.version>
  JDK_VERSION: '26'

jobs:
  owasp-check:
    name: OWASP Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Run OWASP dependency check
        run: ./mvnw -B -ntp -Psecurity-audit verify -DskipTests
