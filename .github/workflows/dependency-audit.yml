name: Scheduled Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with pom.xml <jdk.version>
  JDK_VERSION: '28'

jobs:
  owasp-check:
    name: OWASP Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Run OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -ntp -Psecurity-audit org.owasp:dependency-check-maven:check -Dnvd_api_key=${NVD_API_KEY}
