name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with pom.xml <jdk.version> and .sdkmanrc
  JDK_VERSION: '27'
  GRAALVM_JAVA_VERSION: '25.0.3'
  GRAALVM_DISTRIBUTION: 'graalvm'

jobs:
  supply-chain-guard:
    name: Supply Chain Guard
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Validate dependency policy (enforcer + checksum)
        run: ./mvnw -B -ntp -DskipTests -P!security-audit validate

  build-JAR:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: 
      - supply-chain-guard
      - dependency-audit

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests compile

      - name: Test
        run: ./mvnw -B -ntp test

      - name: Build fat JAR
        run: ./mvnw -B -ntp -DskipTests package

      - name: Generate SBOM (CycloneDX)
        run: ./mvnw -B -ntp -DskipTests cyclonedx:makeAggregateBom

      - name: Generate artifact checksums
        run: |
          cd target
          for f in multi-agent-reviewer-*.jar sbom.json; do
            [ -f "$f" ] && sha256sum "$f"
          done | tee artifact-checksums.txt

      - name: Upload JVM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: jvm-artifact
          path: |
            target/*-SNAPSHOT.jar
            target/sbom.json
            target/artifact-checksums.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 7

  build-native-image:
    name: Build Native Image
    runs-on: ubuntu-latest
    needs:
      - supply-chain-guard
      - dependency-audit

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
        with:
          java-version: ${{ env.GRAALVM_JAVA_VERSION }}
          distribution: ${{ env.GRAALVM_DISTRIBUTION }}

      - name: Build Native Image
        continue-on-error: true
        run: ./mvnw -B -ntp -Pnative -DskipTests package -f pom-native.xml

      - name: Upload native image artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: native-image
          path: |
            target/review
            target/review.exe
          if-no-files-found: warn
          retention-days: 7

      - name: Archive generated reports if present
        if: always()
        run: |
          latest="$(find reports -mindepth 1 -maxdepth 3 -type d | sort | tail -n 1 || true)"
          if [ -n "${latest}" ] && [ -d "${latest}" ]; then
            scripts/archive-reports.sh "${latest}" "reports-latest.tar.gz"
          else
            echo "No generated report directory found; skipping archive."
          fi

      - name: Upload report archive if present
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: reports-archive
          path: reports-latest.tar.gz
          if-no-files-found: warn
          retention-days: 7

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: supply-chain-guard

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Restore OWASP Dependency-Check cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/owasp
          key: dependency-check-${{ runner.os }}-${{ hashFiles('pom.xml', 'pom-native.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP dependency check (retry on NVD outage)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          attempts=4
          delay=30
          transient_pattern='(NvdApiException|NVD Returned Status Code: (429|5[0-9]{2})|Error updating the NVD Data|NoDataException|Unable to update .*DataSource|NVD API request failures)'
          mkdir -p target
          for i in $(seq 1 "$attempts"); do
            attempt_log="target/dependency-check-attempt-${i}.log"
            echo "Dependency-Check attempt $i/$attempts"
            if ./mvnw -B -ntp \
              -Psecurity-audit \
              org.owasp:dependency-check-maven:check \
              -Dnvd_api_key="${NVD_API_KEY}" \
              -DdataDirectory=/tmp/owasp \
              -DnvdMaxRetryCount=8 \
              -DnvdApiDelay=6000 \
              -DnvdValidForHours=24 \
              2>&1 | tee "${attempt_log}"; then
              exit 0
            fi
            if ! grep -Eq "${transient_pattern}" "${attempt_log}"; then
              echo "Dependency-Check failed with a non-transient error; not retrying."
              exit 1
            fi
            if [ "$i" -lt "$attempts" ]; then
              echo "Dependency-Check failed (likely transient NVD/API issue). Retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          echo "Dependency-Check failed after ${attempts} attempts."
          exit 1

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: dependency-check-reports
          path: |
            target/dependency-check-report.*
            target/dependency-check-attempt-*.log
          if-no-files-found: warn
          retention-days: 7