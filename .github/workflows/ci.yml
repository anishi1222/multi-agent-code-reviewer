name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with pom.xml <jdk.version> and .sdkmanrc
  JDK_VERSION: '26'
  GRAALVM_JAVA_VERSION: '25.0.3'
  GRAALVM_DISTRIBUTION: 'graalvm'

jobs:
  supply-chain-guard:
    name: Supply Chain Guard
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Validate dependency policy (enforcer + checksum)
        run: |
          ./mvnw -B -ntp -DskipTests dependency-check:check -Dnvd_api_key=${{ secrets.NVD_API_KEY }} -Psecurity-audit
          ./mvnw -B -ntp -DskipTests validate -Dnvd_api_key=${{ secrets.NVD_API_KEY }} -Psecurity-audit
          # ./mvnw -B -ntp -DskipTests validate -Dossindex.username=${{ secrets.OSS_INDEX_USERNAME }} -Dossindex.token=${{ secrets.OSS_INDEX_TOKEN }}

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: supply-chain-guard

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: ${{ env.JDK_VERSION }}

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests compile

      - name: Test
        run: ./mvnw -B -ntp test

      - name: Build fat JAR
        run: ./mvnw -B -ntp -DskipTests package

      - name: Generate SBOM (CycloneDX)
        run: ./mvnw -B -ntp -DskipTests cyclonedx:makeAggregateBom

      - name: Generate artifact checksums
        run: |
          cd target
          for f in multi-agent-reviewer-*.jar sbom.json; do
            [ -f "$f" ] && sha256sum "$f"
          done | tee artifact-checksums.txt

      - name: Upload JVM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: jvm-artifact
          path: |
            target/*-SNAPSHOT.jar
            target/sbom.json
            target/artifact-checksums.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.6
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 7

