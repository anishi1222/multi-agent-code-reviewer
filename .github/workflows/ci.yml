name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain-guard:
    name: Supply Chain Guard
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: 26

      - name: Validate dependency policy (enforcer + checksum)
        run: |
          mvn -B -ntp -DskipTests dependency-check:check -Dnvd_api_key=${{ secrets.NVD_API_KEY }} -Psecurity-audit
          mvn -B -ntp -DskipTests validate -Dnvd_api_key=${{ secrets.NVD_API_KEY }} -Psecurity-audit
          # mvn -B -ntp -DskipTests validate -Dossindex.username=${{ secrets.OSS_INDEX_USERNAME }} -Dossindex.token=${{ secrets.OSS_INDEX_TOKEN }}

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: supply-chain-guard

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: 26

      - name: Compile
        run: mvn -B -ntp -DskipTests compile

      - name: Test
        run: mvn -B -ntp test

      - name: Build fat JAR
        run: mvn -B -ntp -DskipTests package

      - name: Upload JVM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.3.6
        with:
          name: jvm-artifact
          path: target/*-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.3.6
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 7

  build-native-image:
    name: Build Native Image
    runs-on: ubuntu-latest
    needs: supply-chain-guard

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1.5.2
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Build Native Image
        continue-on-error: true
        run: mvn -B -ntp -Pnative -DskipTests package

      - name: Upload native image artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.3.6
        with:
          name: native-image
          path: |
            target/review
            target/review.exe
          if-no-files-found: warn
          retention-days: 7

      - name: Archive generated reports if present
        if: always()
        run: |
          latest="$(find reports -mindepth 1 -maxdepth 3 -type d | sort | tail -n 1 || true)"
          if [ -n "${latest}" ] && [ -d "${latest}" ]; then
            scripts/archive-reports.sh "${latest}" "reports-latest.tar.gz"
          else
            echo "No generated report directory found; skipping archive."
          fi

      - name: Upload report archive if present
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.3.6
        with:
          name: reports-archive
          path: reports-latest.tar.gz
          if-no-files-found: warn
          retention-days: 7

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: supply-chain-guard

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: oracle-actions/setup-java@ec7274acdd237c7fe61395ed2edda22d756b5afe # v1
        with:
          website: jdk.java.net
          release: 26

      - name: Run OWASP dependency check
        run: mvn -B -ntp -Psecurity-audit verify -DskipTests
