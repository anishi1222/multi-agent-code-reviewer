micronaut:
  application:
    name: multi-agent-reviewer

reviewer:
  copilot:
    cli-path: ${COPILOT_CLI_PATH:}
    gh-cli-path: ${GH_CLI_PATH:}
    start-timeout-seconds: ${COPILOT_START_TIMEOUT_SECONDS:60}
    cli-healthcheck-seconds: ${COPILOT_CLI_HEALTHCHECK_SECONDS:10}
    cli-authcheck-seconds: ${COPILOT_CLI_AUTHCHECK_SECONDS:15}
  agents:
    directories:
      - ./agents
      - ./.github/agents
  execution:
    gh-auth-fallback-enabled: ${GH_AUTH_FALLBACK_ENABLED:false}
    concurrency:
      # Local review prompts can be large. Increase carefully with heap size.
      # Guideline: 512MB heap -> around 4, 1GB heap -> around 8.
      parallelism: 4
    timeouts:
      orchestrator-timeout-minutes: 45
      agent-timeout-minutes: 20
      idle-timeout-minutes: 5
      skill-timeout-minutes: 20
      summary-timeout-minutes: 20
      gh-auth-timeout-seconds: 30
    retry:
      max-retries: 2
    buffers:
      max-accumulated-size: 4194304
      initial-accumulated-capacity: 4096
      instruction-buffer-extra-capacity: 32
  circuit-breaker:
    failure-threshold: 8
    reset-timeout-ms: 30000
  local-files:
    max-file-size: 262144
    max-total-size: 2097152
  prompt-budget:
    compact-prompts: false
    peer-content-max-chars: 12000
    synthesis-turn-max-chars: 6000
    synthesis-history-max-chars: 50000
    local-source-max-chars: 1048576
    summary-content-per-agent-max-chars: 12000
    summary-total-max-chars: 60000
    summary-fallback-max-chars: 2000
  templates:
    directory: templates
    default-output-format: default-output-format.md
    report: report.md
    local-review-content: local-review-content.md
    output-constraints: output-constraints.md
    review-quality-constraints: review-quality-constraints.md
    summary:
      system-prompt: summary-system.md
      user-prompt: summary-prompt.md
      executive-summary: executive-summary.md
    fallback:
      summary: fallback-summary.md
  skills:
    filename: SKILL.md
    directory: .github/skills
    max-parameter-value-length: 10000
    max-executor-cache-size: 16
    executor-cache-initial-capacity: 16
    executor-cache-load-factor: 0.75
    service-shutdown-timeout-seconds: 60
    executor-shutdown-timeout-seconds: 30
  mcp:
    github:
      type: http
      url: https://api.githubcopilot.com/mcp/
      allowed-hosts:
        - api.githubcopilot.com
      tools:
        - "get_file_contents"
        - "search_code"
        - "list_commits"
        - "get_commit"
      auth-header-name: Authorization
      # Token value is injected at runtime from environment/CLI; no secret is stored in this file.
      auth-header-template: "Bearer {token}"
  rubber-duck:
    enabled: true
    dialogue-rounds: 3
    peer-model: ${RUBBER_DUCK_PEER_MODEL:gpt-5.5}
    synthesis-strategy: last-responder
  models:
    default-model: claude-opus-4.8-xhigh
    review-model: gpt-5.3-codex
    report-model: claude-sonnet-4.6
    summary-model: claude-sonnet-4.6
    reasoning-effort: high
  summary:
    max-content-per-agent: 50000
    max-total-prompt-content: 200000
    fallback-excerpt-length: 180
    average-result-content-estimate: 8192
    initial-buffer-margin: 4096
    excerpt-normalization-multiplier: 3
